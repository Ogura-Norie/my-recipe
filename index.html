<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>マイレシピ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f8f5f0; color: #333; }

.header { background: #ff6b35; color: white; padding: 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header h1 { font-size: 1.2rem; font-weight: bold; }
.header-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.screen { display: none; }
.screen.active { display: block; }

.search-area { padding: 12px 16px; background: white; border-bottom: 1px solid #eee; display: flex; gap: 8px; }
.search-input { flex: 1; border: 2px solid #ddd; border-radius: 24px; padding: 10px 16px; font-size: 16px; outline: none; }
.search-input:focus { border-color: #ff6b35; }
.voice-search-btn { background: #ff6b35; border: none; color: white; width: 44px; height: 44px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; flex-shrink: 0; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

.recipe-list { padding: 12px; }
.recipe-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); cursor: pointer; display: flex; align-items: center; gap: 12px; }
.recipe-card:active { background: #fff5f0; }
.recipe-icon { width: 48px; height: 48px; background: #fff0e8; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
.recipe-info { flex: 1; min-width: 0; }
.recipe-name { font-weight: bold; font-size: 1rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recipe-meta { font-size: 0.8rem; color: #999; }
.recipe-arrow { color: #ccc; font-size: 1.2rem; }

.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

.fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; background: #ff6b35; color: white; border: none; border-radius: 50%; font-size: 1.8rem; cursor: pointer; box-shadow: 0 4px 12px rgba(255,107,53,0.4); z-index: 50; display: flex; align-items: center; justify-content: center; }

.detail-content { padding: 16px; padding-bottom: 40px; }
.recipe-title-lg { font-size: 1.4rem; font-weight: bold; margin-bottom: 6px; }
.recipe-url-link { color: #ff6b35; font-size: 0.85rem; word-break: break-all; display: block; margin-bottom: 16px; text-decoration: none; }

.section-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-weight: bold; font-size: 1rem; }
.read-btn { background: #ff6b35; color: white; border: none; border-radius: 20px; padding: 8px 16px; font-size: 0.85rem; cursor: pointer; }
.read-btn.playing { background: #e53e3e; }

.ingredient-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
.ingredient-item:last-child { border-bottom: none; }
.ingredient-bullet { width: 6px; height: 6px; background: #ff6b35; border-radius: 50%; flex-shrink: 0; }

.step-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; display: flex; gap: 10px; }
.step-item:last-child { border-bottom: none; }
.step-item.current-step { background: #fff5f0; margin: 0 -16px; padding: 10px 16px; border-radius: 8px; }
.step-num { width: 28px; height: 28px; background: #ff6b35; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; flex-shrink: 0; margin-top: 2px; }
.step-num.current { background: #e53e3e; animation: pulse 1s infinite; }
.step-text { flex: 1; font-size: 0.95rem; line-height: 1.6; }

.step-controls { display: flex; gap: 8px; margin-top: 12px; }
.step-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 0.9rem; cursor: pointer; font-weight: bold; }
.step-btn.prev { background: #e2e8f0; color: #333; }
.step-btn.next { background: #ff6b35; color: white; }
.step-btn.stop { background: #718096; color: white; }

.voice-status { background: #fff5f0; border: 1px solid #ffd4c0; border-radius: 10px; padding: 12px; margin-bottom: 12px; text-align: center; font-size: 0.9rem; display: none; }
.voice-status.active { display: block; }

.form-content { padding: 16px; padding-bottom: 100px; }
.form-group { margin-bottom: 16px; }
.form-label { font-weight: bold; font-size: 0.9rem; color: #555; margin-bottom: 6px; display: block; }
.form-input, .form-textarea { width: 100%; border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 16px; font-family: inherit; outline: none; }
.form-input:focus, .form-textarea:focus { border-color: #ff6b35; }
.form-textarea { resize: vertical; min-height: 100px; }
.form-hint { font-size: 0.78rem; color: #999; margin-top: 4px; }
.save-btn { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #ff6b35; color: white; border: none; border-radius: 30px; padding: 16px 48px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(255,107,53,0.4); z-index: 50; }
.delete-btn { display: block; width: 100%; background: #fff; border: 2px solid #fc8181; color: #e53e3e; border-radius: 10px; padding: 14px; font-size: 1rem; cursor: pointer; margin-top: 16px; text-align: center; font-weight: bold; }

.listening-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; flex-direction: column; }
.listening-overlay.active { display: flex; }
.listening-circle { width: 120px; height: 120px; background: #ff6b35; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; animation: pulse 1s infinite; margin-bottom: 20px; }
.listening-text { color: white; font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
.listening-subtext { color: rgba(255,255,255,0.7); font-size: 0.9rem; }
.listening-cancel { background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 20px; padding: 10px 24px; margin-top: 20px; cursor: pointer; font-size: 0.9rem; }
</style>
</head>
<body>

<!-- 音声検索オーバーレイ -->
<div class="listening-overlay" id="listeningOverlay">
  <div class="listening-circle">🎤</div>
  <div class="listening-text">聞いています...</div>
  <div class="listening-subtext" id="listeningResult">レシピ名を話してください</div>
  <button class="listening-cancel" onclick="stopVoiceSearch()">キャンセル</button>
</div>

<!-- 画面：一覧 -->
<div class="screen active" id="screenList">
  <div class="header">
    <h1>🍳 マイレシピ</h1>
    <div style="width:40px"></div>
  </div>
  <div class="search-area">
    <input type="search" class="search-input" id="searchInput" placeholder="レシピを検索..." oninput="renderList()">
    <button class="voice-search-btn" id="voiceSearchBtn" onclick="startVoiceSearch()" title="音声検索">🎤</button>
  </div>
  <div class="recipe-list" id="recipeList"></div>
  <button class="fab" onclick="showAddScreen()">＋</button>
</div>

<!-- 画面：詳細 -->
<div class="screen" id="screenDetail">
  <div class="header">
    <button class="header-btn" onclick="showListScreen()">←</button>
    <h1 id="detailHeaderTitle" style="font-size:1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60vw">レシピ</h1>
    <button class="header-btn" onclick="showEditScreen(currentRecipeId)">✏️</button>
  </div>
  <div class="detail-content" id="detailContent"></div>
</div>

<!-- 画面：追加・編集 -->
<div class="screen" id="screenForm">
  <div class="header">
    <button class="header-btn" onclick="cancelForm()">✕</button>
    <h1 id="formTitle">レシピを追加</h1>
    <div style="width:40px"></div>
  </div>
  <div class="form-content">
    <input type="hidden" id="editId">
    <div class="form-group">
      <label class="form-label">レシピ名 *</label>
      <input type="text" class="form-input" id="inputName" placeholder="例：タケノコご飯">
    </div>
    <div class="form-group">
      <label class="form-label">参照URL（任意）</label>
      <input type="url" class="form-input" id="inputUrl" placeholder="https://...">
      <div class="form-hint">元のレシピページのURLを貼っておくと後で確認できます</div>
    </div>
    <div class="form-group">
      <label class="form-label">材料（1行に1つ）*</label>
      <textarea class="form-textarea" id="inputIngredients" rows="6" placeholder="米 2合&#10;タケノコ 200g&#10;醤油 大さじ2&#10;みりん 大さじ1"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">手順（1行に1ステップ）*</label>
      <textarea class="form-textarea" id="inputSteps" rows="8" placeholder="米をといで水に30分浸す&#10;タケノコを食べやすい大きさに切る&#10;調味料を合わせて炊飯器に入れる&#10;普通モードで炊く"></textarea>
    </div>
    <div id="deleteArea"></div>
  </div>
  <button class="save-btn" onclick="saveRecipe()">保存する</button>
</div>

<script>
const DB = {
  getAll() { return JSON.parse(localStorage.getItem('myRecipes') || '[]'); },
  save(list) { localStorage.setItem('myRecipes', JSON.stringify(list)); },
  add(r) {
    const list = DB.getAll();
    r.id = Date.now().toString();
    r.createdAt = new Date().toISOString();
    list.push(r);
    DB.save(list);
    return r;
  },
  update(r) { DB.save(DB.getAll().map(x => x.id === r.id ? r : x)); },
  delete(id) { DB.save(DB.getAll().filter(r => r.id !== id)); },
  find(id) { return DB.getAll().find(r => r.id === id); },
  search(q) {
    if (!q) return DB.getAll();
    const kw = q.toLowerCase();
    return DB.getAll().filter(r => r.name.toLowerCase().includes(kw));
  }
};

const Voice = {
  synth: window.speechSynthesis,
  currentStep: 0,
  steps: [],
  mode: null,

  speak(text, onEnd) {
    this.synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 0.85;
    u.pitch = 1.0;
    if (onEnd) u.onend = onEnd;
    u.onerror = () => {};
    this.synth.speak(u);
  },

  readIngredients(ingredients) {
    this.mode = 'ingredients';
    const text = '材料をお伝えします。' + ingredients.join('。') + '。以上です。';
    this.speak(text, () => { this.mode = null; updateVoiceUI(); });
    updateVoiceUI();
  },

  startSteps(steps) {
    this.mode = 'steps';
    this.steps = steps;
    this.currentStep = 0;
    this.readCurrentStep();
  },

  readCurrentStep() {
    if (this.currentStep >= this.steps.length) {
      this.speak('すべての手順が終わりました。お疲れ様でした！', () => {
        this.mode = null;
        updateVoiceUI();
        renderSteps();
      });
      return;
    }
    updateVoiceUI();
    renderSteps();
    this.speak('手順' + (this.currentStep + 1) + '。' + this.steps[this.currentStep]);
  },

  nextStep() {
    this.currentStep = Math.min(this.currentStep + 1, this.steps.length);
    this.readCurrentStep();
  },

  prevStep() {
    if (this.currentStep > 0) this.currentStep--;
    this.readCurrentStep();
  },

  stop() {
    this.synth.cancel();
    this.mode = null;
    this.currentStep = 0;
    updateVoiceUI();
    renderSteps();
  }
};

let recognition = null;

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'ja-JP';
  r.continuous = false;
  r.interimResults = true;
  r.onresult = e => {
    const t = e.results[0][0].transcript;
    document.getElementById('listeningResult').textContent = '「' + t + '」';
    if (e.results[0].isFinal) {
      stopVoiceSearch();
      document.getElementById('searchInput').value = t;
      renderList();
      const hits = DB.search(t);
      if (hits.length === 1) setTimeout(() => showDetailScreen(hits[0].id), 400);
    }
  };
  r.onerror = () => stopVoiceSearch();
  r.onend = () => document.getElementById('listeningOverlay').classList.remove('active');
  return r;
}

function startVoiceSearch() {
  if (!recognition) recognition = initRecognition();
  if (!recognition) {
    alert('このブラウザは音声入力に対応していません。\nAndroid Chromeでご利用ください。');
    return;
  }
  document.getElementById('listeningResult').textContent = 'レシピ名を話してください';
  document.getElementById('listeningOverlay').classList.add('active');
  try { recognition.start(); } catch(e) {}
}

function stopVoiceSearch() {
  if (recognition) try { recognition.stop(); } catch(e) {}
  document.getElementById('listeningOverlay').classList.remove('active');
}

let currentRecipeId = null;
let editingId = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showListScreen() {
  Voice.stop();
  showScreen('screenList');
  renderList();
}

function showDetailScreen(id) {
  currentRecipeId = id;
  const r = DB.find(id);
  if (!r) return showListScreen();
  document.getElementById('detailHeaderTitle').textContent = r.name;
  renderDetailContent(r);
  showScreen('screenDetail');
}

function showAddScreen() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'レシピを追加';
  document.getElementById('editId').value = '';
  document.getElementById('inputName').value = '';
  document.getElementById('inputUrl').value = '';
  document.getElementById('inputIngredients').value = '';
  document.getElementById('inputSteps').value = '';
  document.getElementById('deleteArea').innerHTML = '';
  showScreen('screenForm');
}

function showEditScreen(id) {
  const r = DB.find(id);
  if (!r) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'レシピを編集';
  document.getElementById('editId').value = id;
  document.getElementById('inputName').value = r.name;
  document.getElementById('inputUrl').value = r.url || '';
  document.getElementById('inputIngredients').value = r.ingredients.join('\n');
  document.getElementById('inputSteps').value = r.steps.join('\n');
  document.getElementById('deleteArea').innerHTML =
    '<button class="delete-btn" onclick="deleteRecipe(\'' + id + '\')">🗑️ このレシピを削除</button>';
  showScreen('screenForm');
}

function cancelForm() {
  if (editingId) showDetailScreen(editingId);
  else showListScreen();
}

function renderList() {
  const q = document.getElementById('searchInput').value.trim();
  const list = DB.search(q);
  const el = document.getElementById('recipeList');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">' + (q ? '🔍' : '🍳') + '</div><div>' +
      (q ? '「' + escHtml(q) + '」は見つかりませんでした' : 'レシピを追加してみましょう！') + '</div>' +
      '<div style="font-size:0.8rem;color:#bbb;margin-top:8px">' + (q ? '' : '右下の ＋ ボタンから追加できます') + '</div></div>';
    return;
  }
  el.innerHTML = list.map(r =>
    '<div class="recipe-card" onclick="showDetailScreen(\'' + r.id + '\')">' +
    '<div class="recipe-icon">🍽️</div>' +
    '<div class="recipe-info"><div class="recipe-name">' + escHtml(r.name) + '</div>' +
    '<div class="recipe-meta">材料 ' + r.ingredients.length + '品目・' + r.steps.length + 'ステップ</div></div>' +
    '<div class="recipe-arrow">›</div></div>'
  ).join('');
}

function renderDetailContent(r) {
  const url = r.url
    ? '<a href="' + escHtml(r.url) + '" class="recipe-url-link" target="_blank" rel="noopener">🔗 元のレシピを見る</a>'
    : '';
  document.getElementById('detailContent').innerHTML =
    '<div class="recipe-title-lg">' + escHtml(r.name) + '</div>' + url +
    '<div class="voice-status" id="voiceStatus"></div>' +
    '<div class="section-card">' +
    '<div class="section-header"><div class="section-title">🥕 材料</div>' +
    '<button class="read-btn" id="ingredientsBtn" onclick="toggleIngredients()">▶ 読み上げ</button></div>' +
    '<div id="ingredientsList">' +
    r.ingredients.map(i => '<div class="ingredient-item"><span class="ingredient-bullet"></span>' + escHtml(i) + '</div>').join('') +
    '</div></div>' +
    '<div class="section-card">' +
    '<div class="section-header"><div class="section-title">📋 手順</div>' +
    '<button class="read-btn" id="stepsStartBtn" onclick="toggleSteps()">▶ 読み上げ</button></div>' +
    '<div id="stepsList"></div>' +
    '<div class="step-controls" id="stepControls" style="display:none">' +
    '<button class="step-btn prev" onclick="Voice.prevStep()">◀ 前へ</button>' +
    '<button class="step-btn stop" onclick="Voice.stop()">■ 停止</button>' +
    '<button class="step-btn next" onclick="Voice.nextStep()">次へ ▶</button>' +
    '</div></div>';
  renderSteps();
}

function renderSteps() {
  const r = DB.find(currentRecipeId);
  if (!r) return;
  const el = document.getElementById('stepsList');
  if (!el) return;
  el.innerHTML = r.steps.map((s, i) => {
    const isCurrent = Voice.mode === 'steps' && i === Voice.currentStep;
    return '<div class="step-item' + (isCurrent ? ' current-step' : '') + '">' +
      '<div class="step-num' + (isCurrent ? ' current' : '') + '">' + (i + 1) + '</div>' +
      '<div class="step-text">' + escHtml(s) + '</div></div>';
  }).join('');
  const ctrl = document.getElementById('stepControls');
  if (ctrl) ctrl.style.display = Voice.mode === 'steps' ? 'flex' : 'none';
}

function updateVoiceUI() {
  const el = document.getElementById('voiceStatus');
  if (!el) return;
  if (Voice.mode === 'ingredients') {
    el.className = 'voice-status active';
    el.textContent = '🔊 材料を読み上げています...';
  } else if (Voice.mode === 'steps') {
    el.className = 'voice-status active';
    el.textContent = '🔊 手順 ' + (Voice.currentStep + 1) + ' / ' + Voice.steps.length + ' を読み上げています';
  } else {
    el.className = 'voice-status';
  }
  const ib = document.getElementById('ingredientsBtn');
  if (ib) { ib.textContent = Voice.mode === 'ingredients' ? '■ 停止' : '▶ 読み上げ'; ib.className = 'read-btn' + (Voice.mode === 'ingredients' ? ' playing' : ''); }
  const sb = document.getElementById('stepsStartBtn');
  if (sb) { sb.textContent = Voice.mode === 'steps' ? '■ 停止' : '▶ 読み上げ'; sb.className = 'read-btn' + (Voice.mode === 'steps' ? ' playing' : ''); }
}

function toggleIngredients() {
  const r = DB.find(currentRecipeId);
  if (!r) return;
  if (Voice.mode === 'ingredients') Voice.stop();
  else Voice.readIngredients(r.ingredients);
}

function toggleSteps() {
  const r = DB.find(currentRecipeId);
  if (!r) return;
  if (Voice.mode === 'steps') Voice.stop();
  else Voice.startSteps(r.steps);
}

function saveRecipe() {
  const name = document.getElementById('inputName').value.trim();
  const url = document.getElementById('inputUrl').value.trim();
  const ingredients = document.getElementById('inputIngredients').value.trim().split('\n').filter(l => l.trim());
  const steps = document.getElementById('inputSteps').value.trim().split('\n').filter(l => l.trim());
  if (!name) { alert('レシピ名を入力してください'); return; }
  if (!ingredients.length) { alert('材料を入力してください'); return; }
  if (!steps.length) { alert('手順を入力してください'); return; }
  const id = document.getElementById('editId').value;
  if (id) { DB.update({ id, name, url, ingredients, steps }); showDetailScreen(id); }
  else { const r = DB.add({ name, url, ingredients, steps }); showDetailScreen(r.id); }
}

function deleteRecipe(id) {
  if (!confirm('このレシピを削除しますか？')) return;
  DB.delete(id);
  showListScreen();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('load', () => {
  const params = new URLSearchParams(location.search);
  const q = params.get('q') || params.get('search');
  if (q) document.getElementById('searchInput').value = decodeURIComponent(q);

  if (DB.getAll().length === 0) {
    DB.add({
      name: 'タケノコご飯（サンプル）',
      url: '',
      ingredients: ['米 2合', 'タケノコ水煮 200g', '醤油 大さじ2', 'みりん 大さじ1', '酒 大さじ1', '和風だし 小さじ1', '油揚げ 1枚（任意）'],
      steps: [
        '米をといで水に30分浸します',
        'タケノコを薄切りにします',
        '油揚げを細切りにします',
        '炊飯器に米・タケノコ・油揚げを入れます',
        '醤油・みりん・酒・だしを加え、2合の目盛りまで水を足します',
        '普通モードで炊きます',
        '炊き上がったら全体を混ぜて完成です'
      ]
    });
  }
  renderList();
});
</script>
</body>
</html>
